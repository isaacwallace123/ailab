[tool.uv.workspace]
members = ["services/lab-status-assistant", "services/research-gateway"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["services/lab-status-assistant/tests", "tests"]
