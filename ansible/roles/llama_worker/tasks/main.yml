---
- name: Verify the accepted runtime and model exist
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - "{{ ailab_llama_cpp_build_dir }}/bin/llama-server"
    - "{{ ailab_candidate_model_path }}"
  register: ailab_llama_worker_artifacts

- name: Require the pinned llama.cpp worker artifacts
  ansible.builtin.assert:
    that:
      - ailab_llama_worker_artifacts.results | length == 2
      - ailab_llama_worker_artifacts.results | map(attribute='stat.exists') | min
      - ailab_llama_worker_artifacts.results | map(attribute='stat.isreg') | min
    fail_msg: Run the accepted llama-vulkan and candidate playbooks before enabling a worker.

- name: Install the persistent llama.cpp worker unit
  ansible.builtin.template:
    src: ailab-llama-worker.service.j2
    dest: /etc/systemd/system/ailab-llama-worker.service
    owner: root
    group: root
    mode: "0644"
  register: ailab_llama_worker_unit

- name: Allow the gateway node to reach a network-bound worker
  community.general.ufw:
    rule: allow
    direction: in
    proto: tcp
    to_port: "{{ ailab_llama_worker_port | string }}"
    from_ip: "{{ item }}"
    comment: AI lab model gateway to llama worker
  loop: "{{ ailab_llama_worker_allowed_cidrs }}"

- name: Reload systemd after changing the worker unit
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: ailab_llama_worker_unit.changed

- name: Enable and start the persistent llama.cpp worker
  ansible.builtin.systemd_service:
    name: ailab-llama-worker.service
    enabled: true
    state: started
  register: ailab_llama_worker_service

- name: Restart the worker when its unit changed
  ansible.builtin.systemd_service:
    name: ailab-llama-worker.service
    state: restarted
  when: ailab_llama_worker_unit.changed and not ailab_llama_worker_service.changed

- name: Wait for the local worker health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ ailab_llama_worker_port }}/health"
    method: GET
    status_code: 200
    return_content: true
  register: ailab_llama_worker_health
  retries: 60
  delay: 2
  until: ailab_llama_worker_health.status == 200
  changed_when: false

- name: Require the expected loaded worker model
  ansible.builtin.assert:
    that:
      - ailab_llama_worker_health.json.status == 'ok'
    fail_msg: "The persistent worker on {{ inventory_hostname }} is not ready."
